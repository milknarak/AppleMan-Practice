name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build (production with mock interceptor)
        working-directory: frontend
        run: npx ng build --base-href "/AppleMan-Practice/"

      - name: SPA fallback (copy index.html → 404.html for client-side routing)
        run: cp frontend/dist/appleman-practice/browser/index.html frontend/dist/appleman-practice/browser/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/appleman-practice/browser

      - id: deployment
        uses: actions/deploy-pages@v4
